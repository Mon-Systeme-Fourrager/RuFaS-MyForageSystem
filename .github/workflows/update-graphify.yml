# .github/workflows/update-graphify.yml
name: Update Graphify Graph

on:
  workflow_dispatch:
    inputs:
      semantic:
        description: 'Run full semantic pass (uses ANTHROPIC_API_KEY — incurs API cost)'
        type: boolean
        default: false
  push:
    branches: [dev-msf]
    paths:
      - 'RUFAS/**'
      - 'scripts/generate-graph-mermaid.py'
      - '.graphifyignore'
      - '.github/workflows/update-graphify.yml'

concurrency:
  group: graphify-update
  cancel-in-progress: true

jobs:
  update-graph:
    name: Update dependency graph
    runs-on: ubuntu-latest
    # Éviter une boucle infinie : skip les commits faits par le bot lui-même
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write   # nécessaire pour git push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-msf
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphifyy
        run: pip install graphifyy

      # Cache graph.json pour éviter de recalculer les edges déjà connus
      - name: Restore graph.json cache
        id: cache-graph
        uses: actions/cache/restore@v4
        with:
          path: graphify-out/graph.json
          key: graphify-graph-${{ github.sha }}
          restore-keys: |
            graphify-graph-

      - name: Update graph
        run: |
          if [ "${{ inputs.semantic }}" = "true" ]; then
            echo "🧠 Running full semantic pass (graphify .)"
            graphify .
          else
            echo "🔍 Running AST-only pass (graphify update .)"
            graphify update .
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Regenerate Mermaid block in GRAPH_REPORT.md
        run: python3 scripts/generate-graph-mermaid.py

      - name: Save graph.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: graphify-out/graph.json
          key: graphify-graph-${{ github.sha }}

      - name: Check for changes in GRAPH_REPORT.md
        id: diff
        run: |
          if git diff --quiet graphify-out/GRAPH_REPORT.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ GRAPH_REPORT.md already up to date — nothing to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 GRAPH_REPORT.md changed — will commit"
          fi

      - name: Commit and push updated report
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graphify-out/GRAPH_REPORT.md
          git commit --no-verify -m "chore: update graphify graph report [skip ci]"
          git pull --rebase origin dev-msf || {
            git rebase --abort
            echo "::warning::Rebase conflict — graph report commit skipped. Will retry on next push."
            exit 0
          }
          git push
          echo "✅ Graph report updated and pushed!"
