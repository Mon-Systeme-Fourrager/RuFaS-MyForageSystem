# .github/workflows/update-graphify.yml
name: Update Graphify Graph

on:
  workflow_dispatch:
  push:
    branches: [dev-msf]
    paths:
      - 'RUFAS/**'
      - 'scripts/generate-graph-mermaid.py'
      - '.graphifyignore'
      - '.github/workflows/update-graphify.yml'

concurrency:
  group: graphify-update
  cancel-in-progress: true

jobs:
  update-graph:
    name: Update dependency graph
    runs-on: ubuntu-latest
    # Éviter une boucle infinie : skip les commits faits par le bot lui-même
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-msf
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphifyy
        run: pip install "graphifyy==0.5.7"

      # Cache graph.json pour éviter de recalculer les edges déjà connus
      - name: Restore graph.json cache
        id: cache-graph
        uses: actions/cache/restore@v4
        with:
          path: graphify-out/graph.json
          key: graphify-graph-${{ github.sha }}
          restore-keys: |
            graphify-graph-

      - name: Update graph
        run: |
          echo "🔍 Running AST pass (graphify update .)"
          graphify update .

      - name: Regenerate Mermaid block in GRAPH_REPORT.md
        run: python3 scripts/generate-graph-mermaid.py

      - name: Save graph.json cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: graphify-out/graph.json
          key: graphify-graph-${{ github.sha }}

      - name: Check for changes in GRAPH_REPORT.md
        id: diff
        run: |
          if git diff --quiet graphify-out/GRAPH_REPORT.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ GRAPH_REPORT.md already up to date — nothing to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 GRAPH_REPORT.md changed — will commit"
          fi

      - name: Commit and push updated report via PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="graphify/update-graph-report"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Crée/réinitialise la branche dédiée depuis dev-msf
          git checkout -B "$BRANCH"
          git add graphify-out/GRAPH_REPORT.md
          git commit --no-verify -m "chore: update graphify graph report [skip ci]"
          git push -f origin "$BRANCH"

          # Crée la PR si elle n'existe pas encore
          if ! gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            gh pr create \
              --base dev-msf \
              --head "$BRANCH" \
              --title "chore: update graphify graph report [skip ci]" \
              --body "Mise à jour automatique du rapport de dépendances Graphify."
          fi

          # Active l'auto-merge (squash) — se fusionne dès que les checks passent
          gh pr merge "$BRANCH" --auto --squash 2>/dev/null || true

          echo "✅ PR du rapport Graphify créée/mise à jour !"
